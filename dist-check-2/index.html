<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thanushree Portfolio</title>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body,
      #root {
        margin: 0;
        min-height: 100%;
        background: #050505;
        color: white;
      }

      body {
        font-family: Arial, Helvetica, sans-serif;
      }

      .fallback-page {
        min-height: 100vh;
        padding: 56px;
        background:
          radial-gradient(circle at 70% 18%, rgba(20, 184, 166, 0.22), transparent 30%),
          linear-gradient(135deg, #050505 0%, #071315 55%, #050505 100%);
      }

      .fallback-eyebrow {
        margin: 0 0 12px;
        color: #7dd3fc;
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      .fallback-page h1 {
        margin: 0;
        font-size: clamp(44px, 8vw, 88px);
        line-height: 0.96;
      }

      .fallback-role {
        margin: 16px 0 34px;
        color: #d6f6ff;
        font-size: 24px;
      }

      .fallback-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 14px;
        width: min(960px, 100%);
      }

      .fallback-card {
        min-height: 132px;
        padding: 20px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 8px;
        background: rgba(0, 0, 0, 0.48);
      }

      .fallback-card h2 {
        margin: 0 0 10px;
        color: #86efac;
        font-size: 20px;
      }

      .fallback-card p {
        margin: 0;
        color: #f8fafc;
        line-height: 1.55;
      }

      @media (max-width: 760px) {
        .fallback-page {
          padding: 32px 20px;
        }

        .fallback-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
    <script type="module" crossorigin src="/assets/index-EGW8zFig.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-Qg0ZXWE-.css">
  </head>
  <body>
    <div id="root">
      <div class="fallback-page">
        <p class="fallback-eyebrow">Portfolio</p>
        <h1>Thanushree M</h1>
        <p class="fallback-role">Data Analyst</p>

        <section class="fallback-grid" aria-label="Portfolio details">
          <div class="fallback-card">
            <h2>Skills</h2>
            <p>Python, SQL, Power BI, Excel</p>
          </div>
          <div class="fallback-card">
            <h2>Projects</h2>
            <p>Netflix AI Voice Search, Electro AI IoT Platform</p>
          </div>
          <div class="fallback-card">
            <h2>Experience</h2>
            <p>Titan Company Pvt Ltd - Intern<br />Industrial Power Systems Exposure</p>
          </div>
        </section>
      </div>
    </div>
  </body>
</html>
